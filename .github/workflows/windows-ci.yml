name: Windows CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        # Test the minimum supported Python and the current development version.
        python-version:
          - "3.10"
          - "3.14"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Verify package metadata
        run: python -m pip install --no-deps .

      - name: Compile Python sources
        run: >-
          python -m py_compile
          src/agy_shim/main.py
          tests/test_e2e.py
          tests/test_security.py
          tests/fixtures/mock_agy.py

      - name: Run deterministic test suite
        run: python -m pytest -q

      - name: Rebuild native provider launchers
        shell: pwsh
        run: .\scripts\build_launchers.ps1 -OutputRoot "$env:RUNNER_TEMP\agy-shim-launchers\bin" -IncludeRuntime

      - name: Verify provider wrappers
        shell: pwsh
        run: |
          $expected = @{
            claude = "2.1.165"
            codex = "0.137.0"
            copilot = "1.0.59"
            cursor = "1.0.0"
            gemini = "0.45.1"
          }

          foreach ($provider in $expected.Keys) {
            $cmdActual = (& ".\bin\$provider\$provider.cmd" --version).Trim()
            $exeActual = (& "$env:RUNNER_TEMP\agy-shim-launchers\bin\$provider\$provider.exe" --version).Trim()
            if ($cmdActual -ne $expected[$provider]) {
              throw "$provider.cmd returned '$cmdActual'; expected '$($expected[$provider])'"
            }
            if ($exeActual -ne $expected[$provider]) {
              throw "$provider.exe returned '$exeActual'; expected '$($expected[$provider])'"
            }
          }

          $cursorAgent = (& "$env:RUNNER_TEMP\agy-shim-launchers\bin\cursor\cursor-agent.exe" --version).Trim()
          if ($cursorAgent -ne "1.0.0") {
            throw "cursor-agent.exe returned '$cursorAgent'; expected '1.0.0'"
          }
