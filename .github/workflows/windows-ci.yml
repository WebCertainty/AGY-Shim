name: Windows CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        # Test the minimum supported Python and the current development version.
        python-version:
          - "3.10"
          - "3.14"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Verify package metadata
        run: python -m pip install --no-deps .

      - name: Compile Python sources
        run: >-
          python -m py_compile
          src/agy_shim/main.py
          tests/test_e2e.py
          tests/fixtures/mock_agy.py

      - name: Run deterministic ACP end-to-end tests
        run: python tests/test_e2e.py

      - name: Verify provider wrappers
        shell: pwsh
        run: |
          $expected = @{
            claude = "2.1.165"
            codex = "0.137.0"
            copilot = "1.0.59"
            cursor = "1.0.0"
            gemini = "0.45.1"
          }

          foreach ($provider in $expected.Keys) {
            $actual = (& ".\bin\$provider.cmd" --version).Trim()
            if ($actual -ne $expected[$provider]) {
              throw "$provider returned '$actual'; expected '$($expected[$provider])'"
            }
          }
