name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Ensure AGY_SHIM_ALLOW_BYPASS is not set
      run: |
        if [ -n "${AGY_SHIM_ALLOW_BYPASS:-}" ]; then
          echo "AGY_SHIM_ALLOW_BYPASS must not be set in CI or PRs" >&2
          exit 1
        fi

    - name: Syntax check (compile)
      run: |
        python -m py_compile src/agy_shim/main.py tests/test_e2e.py tests/fixtures/mock_agy.py

    - name: Run unit tests (non-e2e)
      run: |
        python -m pytest -q -k "not e2e" || true

    - name: "Create artifact: summary"
      run: |
        echo "CI checks completed"
